# translate-routes.toml — read-gate route table (ferray-python ← NumPy)
#
# Consumed by tooling/translate-discipline.py to gate Edit/Write on
# ferray-python/src/*.rs binding modules. Each [[route]] declares:
#
#   crate_pattern : repo-relative target file (exact or glob).
#   upstream      : numpy source paths under /home/doll/numpy-ref/, at
#                   least ONE of which must be Read before the edit.
#   design        : .design/<doc>.md governing this translation. MUST
#                   exist on disk; if missing, the hook blocks with
#                   acto-doc-author dispatch instructions.
#   parity_ops    : informational only for this project. Verification is
#                   pytest-vs-numpy (see goal.md "The verification model"),
#                   NOT a parity-sweep --op harness. Listed here as the
#                   edge-case function families each module owns.
#
# Every gated edit also requires Read of goal.md in the same session.
# Files under ferray-python/src/ without a route are BLOCKED (R-XLATE-2).

# ─────────────────────────────────────────────────────────────────────────
# Proof-loop modules (highest divergence risk: NaN / dtype / empty / errs)
# ─────────────────────────────────────────────────────────────────────────

