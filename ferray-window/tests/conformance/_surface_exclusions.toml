# Surface exclusions for ferray-window.
#
# Every entry covers a private inner-module path whose user-facing API is
# the corresponding re-export at the crate root. The conformance test cited
# in `covered_by` exercises the implementation through the re-export, which
# binds to the same function symbol, so the inner path is implicitly
# verified by the same test.

# ---------------------------------------------------------------------------
# Inner paths in `ferray_window::windows::*`
# ---------------------------------------------------------------------------

[[exclusion]]
path = "ferray_window::windows::bartlett"
reason = "Private inner path. The user-facing API is the re-export at ferray_window::bartlett, which has a conformance test against numpy.bartlett."
covered_by = "tests/conformance_windows.rs::bartlett_matches_numpy"

