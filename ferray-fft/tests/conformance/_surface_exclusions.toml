# Surface exclusions for ferray-fft.
#
# Items NOT directly invoked by a conformance test fall into these
# categories:
#
#   1. Functions whose user-facing semantics are pinned by an existing
#      conformance test in this crate (one fixture per family — fft for
#      fftn, fft2 for fft_real2 / fft_realn convenience wrappers, rfft
#      for rfftn / rfft2, irfft for irfftn / irfft2, plus the FftNorm
#      enum which is exercised by every test through the `FftNorm`
#      argument) but for which NumPy oracle fixtures have not yet been
#      generated. The umbrella issue #753 tracks extending fixture
#      coverage to these functions; until those fixtures land, every
#      such item carries a `covered_by` anchor pointing to the existing
#      test that already pins the surrounding family's contract, and
#      cites #753.
#
#   2. Plan / preallocated-output API surface (`FftPlan`, `FftPlanND`,
#      `fft_into`, `ifft_into`, `rfft_into`, `irfft_into`) — these have
#      no NumPy reference (NumPy has no plan caching), so they are
#      structurally untestable against a fixture. The plan API's
#      correctness is pinned by `tests/acceptance.rs`, which round-trips
#      every shape against the un-cached path.
#
#   3. Internal helpers that ARE `pub` for cross-module use but have
#      no NumPy analog: `axes::*` (axis-normalization arithmetic) and
#      `nd::*` (the inner axis-walker used by `fftn` / `rfftn`). Their
#      correctness is pinned transitively by every multi-dim test in
#      this crate's conformance and oracle suites that goes through
#      `fftn` / `rfftn` / `irfftn`.
#
#   4. The `FftFloat` trait — a type-system extension that gates
#      `T: FftNum + Element`; no runtime surface, exercised by every
#      generic FFT call through its bound.
#
# Every entry below cites a non-empty `reason` and a non-empty
# `covered_by` anchor as required by the strict surface-coverage gate.

# ============================================================================
# (1) FFT-family functions awaiting fixtures — tracked by #753
# ============================================================================

# ---- fftn / ifftn ----------------------------------------------------------

[[exclusion]]
path = "ferray_fft::fftn"
reason = "N-dimensional complex FFT — the variadic-axis form of fft / fft2. The 1-D and 2-D forms are pinned by conformance_fft_1d and conformance_fft2; the N-D dispatcher is a thin axis loop over the same kernel. NumPy oracle fixtures are not yet generated for fftn — umbrella issue #753 tracks adding fixtures/fft/fftn.json so this entry can be replaced by a real test."
covered_by = "ferray-fft/tests/conformance_complex.rs::conformance_fft2"

[[exclusion]]
path = "ferray_fft::complex::fftn"
reason = "Inner canonical path of `fftn`, re-exported at the crate root. Same rationale as the re-export entry — covered transitively by conformance_fft2 today, dedicated fixture awaits #753."
covered_by = "ferray-fft/tests/conformance_complex.rs::conformance_fft2"

[[exclusion]]
path = "ferray_fft::ifftn"
reason = "N-dimensional complex inverse FFT — same rationale as fftn. The 1-D / 2-D inverses are pinned by conformance_ifft_1d and conformance_ifft2; fixtures/fft/ifftn.json awaits #753."
