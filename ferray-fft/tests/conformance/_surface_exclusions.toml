[[exclusion]]
path = "ferray_fft::FftPlan"
reason = "Plan-caching handle for 1-D FFTs. NumPy has no plan API, so this struct has no oracle fixture — its correctness is pinned by `tests/acceptance.rs`, which round-trips every supported shape through the plan and asserts numerical equivalence with the un-cached `fft` / `ifft` path."
covered_by = "ferray-fft/tests/acceptance.rs"

