# Surface exclusions for ferray-fft.
#
# Items NOT directly invoked by a conformance test fall into these
# categories:
#
#   1. Ferray extension helpers with no NumPy oracle counterpart in the
#      local NumPy snapshot (`hfft2` / `ihfft2` / `hfftn` / `ihfftn`).
#      These are pinned by in-crate Hermitian roundtrip tests.
#
#   2. Plan API surface (`FftPlan`, `FftPlanND`) — NumPy has no plan
#      caching API, so these are structurally untestable against a
#      fixture. The plan API's correctness is pinned by `tests/acceptance.rs`,
#      which round-trips every shape against the un-cached path.
#
#   3. Internal helpers that ARE `pub` for cross-module use but have
#      no NumPy analog: `axes::*` (axis-normalization arithmetic) and
#      `nd::*` (the inner axis-walker used by `fftn` / `rfftn`). Their
#      correctness is pinned transitively by every multi-dim test in
#      this crate's conformance and oracle suites that goes through
#      `fftn` / `rfftn` / `irfftn`.
#
#   4. The `FftFloat` trait — a type-system extension that gates
#      `T: FftNum + Element`; no runtime surface, exercised by every
#      generic FFT call through its bound.
#
# Every entry below cites a non-empty `reason` and a non-empty
# `covered_by` anchor as required by the strict surface-coverage gate.

# ============================================================================
# (1) FFT extension helpers with no direct NumPy oracle
# ============================================================================

# ---- fft_real / ifft_real / fft_real2 / fft_realn --------------------------

# ---- fft_into / ifft_into preallocated-output 1-D variants -----------------

# ---- rfft_into / irfft_into preallocated-output 1-D variants ---------------

# ---- hfft2 / ihfft2 / hfftn / ihfftn extension surface ---------------------

[[exclusion]]
path = "ferray_fft::hfft2"
reason = "Ferray/Torch-style 2-D Hermitian FFT helper. NumPy 2.4.5 exposes `numpy.fft.hfft` but has no `numpy.fft.hfft2`, so there is no direct NumPy oracle fixture to generate for this extension surface. Correctness is pinned by the in-crate Hermitian roundtrip tests."
covered_by = "ferray-fft/src/hermitian.rs::tests::hfft2_ihfft2_roundtrip"

