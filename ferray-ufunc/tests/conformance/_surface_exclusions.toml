# Surface exclusions for ferray-ufunc, generated by
# scripts/gen_ufunc_exclusions.py. Each entry covers a public
# item that is not (or not yet) directly mentioned by a
# conformance test under `tests/conformance_*.rs`. Categories:
#   - Inner canonical paths (`ops::<mod>::<fn>`) whose re-export
#     is covered: inner is implicitly verified by the same test.
#   - Internal modules (`dispatch::`, `helpers::`, `kernels::`,
#     etc.): not part of the user-facing API contract.
#   - User-facing items without a fixture: tracked under
#     umbrella issue #751.


