name: Conformance gates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  conformance:
    runs-on: ubuntu-latest
    env:
      # pyo3 (used by ferray-numpy-interop's numpy_conv roundtrip tests) links
      # against and runs this interpreter; pin it so the build- and run-time
      # Python match the one we install NumPy into.
      PYO3_PYTHON: python
    steps:
      - uses: actions/checkout@v4
      # ferray-numpy-interop's `numpy_conv::tests` exercise the pyo3 <-> NumPy
      # array-API bridge, which imports `numpy` at runtime. The gate runs
      # `cargo test --workspace`, so without NumPy on the linked interpreter
      # those tests panic with "No module named 'numpy'". Provide it.
      - name: Set up Python (runtime interpreter for the pyo3 <-> NumPy bridge tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install NumPy (imported at runtime by the numpy_conv roundtrip tests)
        run: python -m pip install --upgrade pip numpy
      - name: Install Rust toolchain (stable, MSRV)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build conformance test binaries
        run: cargo build --workspace --tests

      - name: Run strict surface-coverage gates for all 13 crates
        run: |
          for crate in ferray-window ferray-ufunc ferray-stride-tricks \
                       ferray-autodiff ferray-strings ferray-numpy-interop \
                       ferray-fft ferray-ma ferray-io ferray-random \
                       ferray-polynomial ferray-stats ferray-core ferray-linalg; do
            echo "::group::$crate surface-coverage"
            cargo test -p $crate --test conformance_surface_coverage
            echo "::endgroup::"
          done

      - name: Run all conformance suites (catch cascade bugs / regressions)
        run: cargo test --workspace --tests
