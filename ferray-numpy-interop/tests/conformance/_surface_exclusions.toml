# Surface exclusions for ferray-numpy-interop.
#
# ferray-numpy-interop is a feature-gated interop bridge: PyO3/NumPy
# (`python`), Apache Arrow (`arrow`), and Polars (`polars`). Most of
# its public surface is exercised by the conformance tests under
# `tests/conformance_interop.rs`, which name every user-facing crate-
# root re-export AND the inner canonical module path in doc-comment
# "path anchor" blocks so the surface-coverage gate's text-match
# succeeds without requiring the feature to be enabled at gate-test
# time.
#
# The items listed below are NOT directly invoked by a conformance
# test because they fall into one of these categories:
#
#   - PyO3/NumPy paths (`numpy_conv::*`, crate-root re-exports of
#     `AsFerray` / `IntoNumPy`). Tests would require a Python runtime
#     (`Python::initialize()`) which conformance tests intentionally
#     avoid. The PyO3 contract is pinned by the in-crate unit tests
#     in `src/numpy_conv.rs::tests` (test_roundtrip_1d!, roundtrip_2d_*,
#     roundtrip_dyn_f64, empty_array_roundtrip, bit_identical_roundtrip).
#
#   - "Element" extension traits (`ArrowElement`, `PolarsElement`,
#     `NpElement`). These are type-system bridges with no runtime
#     surface to invoke directly; their `impl` correctness is
#     covered by every macro-generated roundtrip test in the
#     corresponding `src/<backend>_conv.rs::tests` module (which
#     drive each implementor through `to_arrow` / `to_polars_series`
#     / `into_pyarray`).
#
# All entries cite a non-empty `reason` and a non-empty `covered_by`
# anchor as required by the strict surface-coverage gate.

# ----- PyO3 / NumPy paths -----

[[exclusion]]
path = "ferray_numpy_interop::AsFerray"
reason = "Crate-root re-export of the `numpy_conv::AsFerray` trait — the PyO3 round-trip surface that converts a `PyReadonlyArray` into a ferray `Array1`/`Array2`/`ArrayD`. Conformance tests intentionally avoid spawning a Python runtime (`Python::initialize()`); the trait's contract is pinned by the in-crate unit tests in `src/numpy_conv.rs::tests` (the `test_roundtrip_1d!` macro for every supported scalar dtype, plus `roundtrip_2d_bool`, `roundtrip_2d_f64`, `roundtrip_dyn_f64`, `empty_array_roundtrip`, `bit_identical_roundtrip`)."
covered_by = "ferray-numpy-interop/src/numpy_conv.rs::tests::roundtrip_f64"

[[exclusion]]
path = "ferray_numpy_interop::IntoNumPy"
reason = "Crate-root re-export of the `numpy_conv::IntoNumPy` trait — the ferray → NumPy direction. Same rationale as `AsFerray`: covered transitively by the `src/numpy_conv.rs::tests` macro-generated round-trips (every test calls `.into_pyarray(py)` on an `Array1`/`Array2`/`ArrayD` and asserts the `PyArrayMethods::shape()` match), and conformance tests intentionally avoid a Python runtime."
covered_by = "ferray-numpy-interop/src/numpy_conv.rs::tests::roundtrip_f64"

[[exclusion]]
path = "ferray_numpy_interop::numpy_conv::AsFerray"
reason = "Inner canonical path of the `AsFerray` trait, re-exported at the crate root. Same rationale as the re-export entry — the trait's PyO3 contract is exercised by the macro-generated round-trips in `src/numpy_conv.rs::tests`."
covered_by = "ferray-numpy-interop/src/numpy_conv.rs::tests::roundtrip_f64"

[[exclusion]]
path = "ferray_numpy_interop::numpy_conv::IntoNumPy"
reason = "Inner canonical path of the `IntoNumPy` trait, re-exported at the crate root. Same rationale as the re-export entry — the trait's PyO3 contract is exercised by the macro-generated round-trips in `src/numpy_conv.rs::tests`."
covered_by = "ferray-numpy-interop/src/numpy_conv.rs::tests::roundtrip_f64"

[[exclusion]]
path = "ferray_numpy_interop::numpy_conv::NpElement"
reason = "Type-system extension trait for the PyO3 backend (NumpyElement + Element bound). No runtime surface; the `impl NpElement for T` set is exercised transitively whenever a `Array1<T>` round-trips through `into_pyarray` / `as_ferray` in `src/numpy_conv.rs::tests`. Every dtype the macro covers (`f64`, `f32`, `i32`, `i64`, `u8`, `u32`, `bool`) walks the `NpElement` bound."
covered_by = "ferray-numpy-interop/src/numpy_conv.rs::tests::roundtrip_f64"

# ----- Element-style type-system extension traits (Arrow / Polars) -----

[[exclusion]]
path = "ferray_numpy_interop::arrow_conv::ArrowElement"
reason = "Type-system extension trait for the Arrow backend (Element + ArrowNativeType bound). No runtime surface; the `impl ArrowElement for T` set is exercised transitively by every `to_arrow` / `to_ferray` round-trip in `src/arrow_conv.rs::tests` (the `test_roundtrip!` macro covers `f32`, `f64`, every signed/unsigned integer width, and — under the `f16` feature — `half::f16`). The conformance test `to_arrow_and_from_arrow_traits_roundtrip` in `tests/conformance_interop.rs` additionally pins the trait through its `T: ArrowElement` bound."
covered_by = "ferray-numpy-interop/src/arrow_conv.rs::tests::roundtrip_f64"

[[exclusion]]
path = "ferray_numpy_interop::polars_conv::PolarsElement"
reason = "Type-system extension trait for the Polars backend (Element + Copy bound). No runtime surface; the `impl PolarsElement for T` set is exercised transitively by every `to_polars_series` / `into_ferray` round-trip in `src/polars_conv.rs::tests` and by `polars_to_from_polars_traits_roundtrip` in `tests/conformance_interop.rs` (which walks the trait's `T: PolarsElement + Copy` bound)."
covered_by = "ferray-numpy-interop/src/polars_conv.rs::tests::roundtrip_f64"
