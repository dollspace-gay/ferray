# ferray-stats surface exclusions (Stage 4)
#
# Conformance proper validates the 116 free public fns by inner-module
# path (e.g. `ferray_stats::reductions::sum`, `ferray_stats::sorting::sort`)
# across tests/conformance_reductions.rs, tests/conformance_searching.rs,
# and tests/conformance_histogram_hypothesis.rs (fixture-anchored where
# fixtures exist under fixtures/stats/, inline otherwise). The flat
# re-exports listed below alias an inner-module definition that is itself
# surfaced on its own row and carries the substantive coverage entry, so
# the same logic is not duplicated at the crate-root path.
