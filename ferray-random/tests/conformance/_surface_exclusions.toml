# ferray-random surface exclusions (Stage 4)
#
# RNG conformance is moment-based, not sample-exact (Stage 1 plan).
# Every public item in _surface.json that is not directly named in
# tests/conformance_random.rs is excluded here with a covered_by
# reference; each row carries a non-generic reason.

[[exclusion]]
path = "ferray_random::bitgen::mt19937::MT19937"
reason = "Struct declaration; constructors and methods are covered by the Generator moment tests in tests/conformance_random.rs (BitGenerator state advances on every sample)."
covered_by = "tests/conformance_random.rs"

